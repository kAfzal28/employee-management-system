<!DOCTYPE html>
<html>

<head>
    <title>Edit Employee</title>

    <style>
        .button {
            background-color: #007bff;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .success-message{
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
        }


    </style>

</head>

<body>

    <h1>Edit Employee</h1>

    {% if messages %}

        {% for message in messages %}

            <div class="success-message">
                 {{ message }}
            </div>

        {% endfor %}

    {% endif %}

    <a href="{% url 'home' %}" class="button">
        ← Employee List
    </a>

    <br><br>

    <form method="POST">

        {% csrf_token %}

        <label>Employee ID:</label>
        <input type="text" name="employee_id" value="{{ employee.employee_id }}" readonly>

        <br><br>

        <label>Name:</label>
        <input type="text" name="name" value="{{ employee.name }}">

        <br><br>

        <label>Email:</label>
        <input type="email" name="email" value="{{ employee.email }}">

        <br><br>

        <label>Department:</label>
        <select name="department">

            {% for department in departments %}

                <option
                    value="{{ department.id }}"
                    {% if department.id == employee.department.id %}
                        selected
                    {% endif %}
                >
                    {{ department.name }}
                </option>

            {% endfor %}

        </select>

        <br><br>

        <label>Joining Date:</label>
        <input type="date" name="joining_date" value="{{ employee.joining_date|date:'Y-m-d' }}">

        <br><br>

        <input type="submit" value="Update Employee">

    </form>

    {% if messages %}

    <script>

    setTimeout(function () {

        window.location.href = "{% url 'home' %}";

    }, 3000);

    </script>
    
    {% endif %}

</body>

</html>
