<!DOCTYPE html>
<html>

<head>
    <title>Edit Department</title>

    <style>

        .button {
            background-color: #007bff;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .success-message{
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <h1>Edit Department</h1>

    {% if messages %}

        {% for message in messages %}

            <div class="success-message">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}

    <a href="{% url 'department_list' %}" class="button">
        ← Department List
    </a>

    <br><br>

    <form method="POST">

        {% csrf_token %}

        <label>Department Name:</label>
        <input type="text" name="name" value="{{ department.name }}">

        <br><br>

        <input type="submit" value="Update Department">

    </form>

    {% if messages %}

    <script>

    setTimeout(function () {

        window.location.href = "{% url 'department_list' %}";

    }, 3000);

    </script>

    {% endif %}

</body>

</html>
