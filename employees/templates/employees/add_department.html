<!DOCTYPE html>
<html>

<head>
    <title>Add Department</title>

    <style>

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .button {
            background-color: #007bff;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <h1>Add Department</h1>

    <a href="{% url 'department_list' %}" class="button">
        ← Department List
    </a>

    <br><br>

    {% if messages %}

        {% for message in messages %}

            <div class="success-message">
                ✅ {{ message }}
            </div>

        {% endfor %}

    {% endif %}

    <form action="" method="POST">

        {% csrf_token %}

        <label>Department Name:</label>
        <input type="text" name="name">

        <br><br>

        <input type="submit" value="Save Department">

    </form>

    <script>

        {% if messages %}

        setTimeout(function () {

            window.location.href = "{% url 'department_list' %}";

        }, 3000);

        {% endif %}

    </script>

</body>

</html>
