<!DOCTYPE html>
<html>

<head>
    <title>Delete Department</title>

    <style>

        .button {
            background-color: #007bff;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .delete-button{

            background-color: red;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;

        }

    </style>

</head>

<body>

    <h1>Delete Department</h1>

    <p>Are you sure you want to delete this department?</p>

    <p><b>Department ID:</b> {{ department.id }}</p>

    <p><b>Department Name:</b> {{ department.name }}</p>

    <br>

    <form method="POST">

        {% csrf_token %}

        <input type="submit" value="Yes, Delete" class="delete-button">

    </form>

    <br>

    <a href="{% url 'department_list' %}" class="button">
        Cancel
    </a>

</body>

</html>
