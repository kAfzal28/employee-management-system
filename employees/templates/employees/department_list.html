<!DOCTYPE html>
<html>

<head>
    <title>Department List</title>

    <style>

    .button {
        background-color: #007bff;
        color: white;
        padding: 10px 18px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
    }

    </style>

</head>

<body>

    <h1>Department List</h1>

    {% if departments %}

    <table border="1">

        <tr>
            <th>Department Name</th>
        </tr>

        {% for department in departments %}

        <tr>
            <td>{{ department.name }}</td>
        </tr>

        {% endfor %}

    </table>

    {% else %}

    <p>No departments found.</p>

    {% endif %}

    <br><br>

    <a href="{% url 'add_department' %}" class="button">
    + Add Department
    </a>

</body>

</html>
